- name: Push to bikram-ops repo
  env:
    GH_TOKEN: ${{ secrets.SK_GH }}
  run: |
    git config --global user.name "bikram-ops"
    git config --global user.email "bikram@cleanomatics.com"

    git clone https://x-access-token:${GH_TOKEN}@github.com/bikram-ops/shankarkholi.git target

    # 🔥 REMOVE target folder from source before copying
    rm -rf target/.git
    rsync -av --exclude=target --exclude=.git . target

    cd target

    # 🔥 IMPORTANT: initialize repo if empty
    git init
    git checkout -b main

    git add .
    git commit -m "sync from bikramm01" || echo "No changes"
    git push https://x-access-token:${GH_TOKEN}@github.com/bikram-ops/shankarkholi.git main --force